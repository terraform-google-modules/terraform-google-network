apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: terraform-google-network-service-connection-policy
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Service Connection Policy
    source:
      repo: https://github.com/terraform-google-modules/terraform-google-network.git
      sourceType: git
      dir: /modules/service-connection-policy
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description: {}
  content:
    examples:
      - name: service-connection-policy
        location: examples/service-connection-policy
  interfaces:
    variables:
      - name: project_id
        description: The project ID where APIs will be enabled (when enable_apis is true).
        varType: string
        required: true
      - name: location
        description: Region where the Service Connection Policies will be created (e.g., us-east4).
        varType: string
        required: true
      - name: service_class
        description: Service class of the managed service to enable PSC for (see product docs for valid values).
        varType: string
        required: true
      - name: enable_apis
        description: Whether to enable required APIs in the project.
        varType: bool
        defaultValue: true
      - name: activate_apis
        description: APIs to enable when enable_apis is true.
        varType: list(string)
        defaultValue:
          - networkconnectivity.googleapis.com
          - compute.googleapis.com
      - name: service_connection_policies
        description: The Service Connection Policies to create.
        varType: |-
          map(object({
              description     = optional(string)
              network_name    = string
              network_project = string
              subnet_names    = list(string)
              limit           = optional(number)
              labels          = optional(map(string), {})
            }))
        defaultValue: {}
    outputs:
      - name: service_connection_policies
        description: Service Connection Policies created.
      - name: service_connection_policy_ids
        description: IDs of the created Service Connection Policies.
  requirements:
    roles:
      - level: Project
        roles:
          - roles/networkconnectivity.admin
          - roles/compute.networkAdmin
          - roles/serviceusage.serviceUsageAdmin
    services:
      - compute.googleapis.com
      - networkconnectivity.googleapis.com
      - serviceusage.googleapis.com
    providerVersions:
      - source: hashicorp/google
        version: ">= 6.0"